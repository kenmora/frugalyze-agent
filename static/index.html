<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Frugalyze Agent - Local Chat</title>
    <style>
      :root {
        --bg: #f6f7f9;
        --card: #ffffff;
        --text: #1f2937;
        --muted: #6b7280;
        --accent: #0f766e;
      }
      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        color: var(--text);
        background: radial-gradient(circle at top, #ecfeff, var(--bg));
      }
      .wrap {
        max-width: 760px;
        margin: 2rem auto;
        padding: 0 1rem;
      }
      .card {
        background: var(--card);
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(2, 6, 23, 0.08);
        overflow: hidden;
      }
      .head {
        padding: 1rem 1.25rem;
        border-bottom: 1px solid #e5e7eb;
      }
      .head h1 {
        margin: 0;
        font-size: 1.1rem;
      }
      .head p {
        margin: 0.35rem 0 0;
        color: var(--muted);
        font-size: 0.9rem;
      }
      #chat {
        height: 380px;
        overflow-y: auto;
        padding: 1rem 1.25rem;
      }
      .msg {
        margin-bottom: 0.8rem;
        line-height: 1.4;
        white-space: pre-wrap;
      }
      .user {
        font-weight: 600;
      }
      .bot {
        color: #0f172a;
      }
      form {
        display: flex;
        gap: 0.6rem;
        border-top: 1px solid #e5e7eb;
        padding: 1rem;
      }
      input {
        flex: 1;
        border: 1px solid #d1d5db;
        border-radius: 10px;
        padding: 0.75rem;
        font-size: 0.95rem;
      }
      button {
        border: none;
        border-radius: 10px;
        padding: 0.75rem 1rem;
        background: var(--accent);
        color: #fff;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <div class="head">
          <h1>Frugalyze Agent (Local)</h1>
          <p>Paste a public image URL. The app classifies URL vs no URL, then analyzes the image.</p>
        </div>
        <div id="chat"></div>
        <form id="chat-form">
          <input id="prompt" placeholder="Type text or paste an image URL..." required />
          <button type="submit">Send</button>
        </form>
      </div>
    </div>

    <script>
      const chat = document.getElementById("chat");
      const form = document.getElementById("chat-form");
      const promptInput = document.getElementById("prompt");

      function addMessage(role, text) {
        const el = document.createElement("div");
        el.className = `msg ${role}`;
        el.textContent = `${role === "user" ? "You" : "App"}: ${text}`;
        chat.appendChild(el);
        chat.scrollTop = chat.scrollHeight;
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const message = promptInput.value.trim();
        if (!message) return;

        addMessage("user", message);
        promptInput.value = "";

        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message }),
        });
        const data = await res.json();
        addMessage("bot", data.reply || "No response.");
      });
    </script>
  </body>
</html>
