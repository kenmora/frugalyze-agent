version: "1.0"
name: "image_classifier"

prompt:
  system_file: "prompts/image_classifier/system.txt"
  schema_file: "prompts/image_classifier/schema.json"

model:
  id: "gpt-5-nano"
  reasoning_effort: "medium"   # low | medium | high
  verbosity: "low"          # low | medium | high
  max_output_tokens: 5000

response:
  format: "json_schema"     # json_schema | json_object | text
  strict_schema: true
  schema_name: "image_classifier"

runtime:
  timeout_seconds: 30
  retries: 1

telemetry:
  log_usage: true
  log_prompt_version: true